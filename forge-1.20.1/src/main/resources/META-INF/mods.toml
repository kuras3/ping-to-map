modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
displayURL="https://github.com/KURONAMI333/ping-to-map"
issueTrackerURL="https://github.com/KURONAMI333/ping-to-map/issues"
description='''
Ping to Map (P2M) for Forge 1.20.1 — Pop a temporary JourneyMap waypoint when a teammate (or yourself) pings a location with Ping-Wheel.
'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="pingwheel"
    mandatory=true
    versionRange="[0,)"
    ordering="AFTER"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="journeymap"
    mandatory=false
    versionRange="[0,)"
    ordering="AFTER"
    side="CLIENT"
